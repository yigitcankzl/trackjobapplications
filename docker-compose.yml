services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackjobs}
      POSTGRES_USER: ${POSTGRES_USER:-trackjobs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REMOVED_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackjobs_user} -d ${POSTGRES_DB:-trackjobs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./trackjobapplications-backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./trackjobapplications-backend:/app
    env_file:
      - ./trackjobapplications-backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}@redis:6379/0
      ROLE: web
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health/\")'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./trackjobapplications-backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info --concurrency=4 --prefetch-multiplier=1
    volumes:
      - ./trackjobapplications-backend:/app
    env_file:
      - ./trackjobapplications-backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}@redis:6379/0
      ROLE: worker
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./trackjobapplications-backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./trackjobapplications-backend:/app
    env_file:
      - ./trackjobapplications-backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-REMOVED_REDIS_PASSWORD}@redis:6379/0
      ROLE: beat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./trackjobapplications-frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "127.0.0.1:3003:3000"
    volumes:
      - ./trackjobapplications-frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
