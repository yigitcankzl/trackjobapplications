<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=350">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>TrackJobApplications</h2>

    <!-- Login Section -->
    <div id="login-section" hidden>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="login-btn">Log In</button>
      </form>
      <p id="login-error" class="error" hidden></p>
    </div>

    <!-- Main Section (Logged In) -->
    <div id="main-section" hidden>
      <div class="user-bar">
        <span id="user-email"></span>
        <a href="#" id="logout-btn">Logout</a>
      </div>

      <div id="job-info" hidden>
        <div class="field">
          <label>Company</label>
          <span id="job-company"></span>
        </div>
        <div class="field">
          <label>Position</label>
          <span id="job-position"></span>
        </div>
        <div class="field">
          <label>Source</label>
          <span id="job-source"></span>
        </div>
        <div class="extras-toggles">
          <a href="#" id="notes-toggle-btn">+ Note</a>
          <a href="#" id="contact-toggle-btn">+ Recruiter</a>
        </div>
        <textarea id="job-notes" class="job-notes" placeholder="Quick note (optional)..." hidden></textarea>
        <div id="contact-fields" class="contact-fields" hidden>
          <input type="text" id="contact-name" placeholder="Recruiter name" maxlength="100">
          <input type="email" id="contact-email" placeholder="Email (optional)" maxlength="254">
        </div>
        <div id="interview-fields" class="interview-fields" hidden>
          <select id="interview-type">
            <option value="phone_screen">Phone Screen</option>
            <option value="technical">Technical</option>
            <option value="behavioral">Behavioral</option>
            <option value="onsite">On-site</option>
            <option value="take_home">Take-home</option>
            <option value="final">Final Round</option>
            <option value="other">Other</option>
          </select>
          <input type="datetime-local" id="interview-date">
        </div>
        <div class="btn-group">
          <button id="save-btn" class="btn-save">To Apply</button>
          <button id="apply-btn" class="btn-apply">Applied</button>
          <button id="interview-btn" class="btn-interview">Interview</button>
        </div>
      </div>

      <div id="no-job" hidden>
        <p>Navigate to a job listing on LinkedIn or Indeed, then open this popup.</p>
      </div>

      <div id="feedback" hidden></div>

      <!-- Stats -->
      <div id="stats-section" hidden>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-num" id="stat-total">-</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-item">
            <span class="stat-num stat-to-apply" id="stat-to-apply">-</span>
            <span class="stat-label">To Apply</span>
          </div>
          <div class="stat-item">
            <span class="stat-num stat-applied" id="stat-applied">-</span>
            <span class="stat-label">Applied</span>
          </div>
          <div class="stat-item">
            <span class="stat-num stat-interview" id="stat-interview">-</span>
            <span class="stat-label">Interview</span>
          </div>
          <div class="stat-item">
            <span class="stat-num stat-offer" id="stat-offer">-</span>
            <span class="stat-label">Offer</span>
          </div>
          <div class="stat-item">
            <span class="stat-num stat-rejected" id="stat-rejected">-</span>
            <span class="stat-label">Rejected</span>
          </div>
        </div>
      </div>

      <!-- Recent Applications -->
      <div id="recent-section" hidden>
        <h3 class="section-title">Recent</h3>
        <ul id="recent-list"></ul>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading">Loading...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
