name: Interview Reminders

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger interview reminders
        run: |
          curl -sf -X POST \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.BACKEND_URL }}/api/v1/cron/send-reminders/"
