<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=350">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>TrackJobApplications</h2>

    <!-- Login Section -->
    <div id="login-section" hidden>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="login-btn">Log In</button>
      </form>
      <p id="login-error" class="error" hidden></p>
    </div>

    <!-- Main Section (Logged In) -->
    <div id="main-section" hidden>
      <div class="user-bar">
        <span id="user-email"></span>
        <a href="#" id="logout-btn">Logout</a>
      </div>

      <div id="job-info" hidden>
        <div class="field">
          <label>Company</label>
          <span id="job-company"></span>
        </div>
        <div class="field">
          <label>Position</label>
          <span id="job-position"></span>
        </div>
        <div class="field">
          <label>Source</label>
          <span id="job-source"></span>
        </div>
        <button id="add-btn">Add Application</button>
      </div>

      <div id="no-job" hidden>
        <p>Navigate to a job listing on LinkedIn or Indeed, then open this popup.</p>
      </div>

      <div id="feedback" hidden></div>
    </div>

    <!-- Loading -->
    <div id="loading">Loading...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
