<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="530" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="260" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="400" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(80, 250)">
    <rect width="64" height="64" rx="14" fill="#f5f5f4"/>
    <g transform="translate(16, 16) scale(1.333)">
      <path stroke="#1c1917" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
        d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </g>
  </g>

