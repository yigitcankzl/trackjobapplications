# fly.toml app configuration file generated for trackjobapplications-backend on 2026-03-10T16:45:07+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trackjobapplications-backend'
primary_region = 'fra'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

[processes]
  app = 'gunicorn --bind :8000 --workers 1 --threads 2 --graceful-timeout 30 --timeout 120 config.wsgi'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  kill_signal = "SIGTERM"
  kill_timeout = 30

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
